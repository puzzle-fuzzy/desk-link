name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Test Windows signing policy
        run: python -m unittest discover -s scripts/tests -p "test_*.py"

      - name: Prepare Windows UI assets for Rust checks
        working-directory: apps/windows-ui
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Verify production application and build local-test installer
        run: python scripts/build-windows-installer.py
