name: Managed relay monitor

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: managed-relay-monitor
  cancel-in-progress: true

jobs:
  probe:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify production TLS and QUIC handshake
        run: python scripts/verify-managed-relay.py
