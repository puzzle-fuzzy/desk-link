name: Managed relay monitor

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: managed-relay-monitor
  cancel-in-progress: true

jobs:
  probe:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify production TLS and QUIC handshake
        run: python scripts/verify-managed-relay.py

      - name: Preserve probe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: managed-relay-probe-${{ github.run_id }}
          path: dist/windows/managed-relay-verification.json
          if-no-files-found: warn
          retention-days: 14
