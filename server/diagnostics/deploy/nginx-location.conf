limit_req_zone $binary_remote_addr zone=desklink_diagnostics:10m rate=30r/m;

# Add these locations to the p2p.yxswy.com HTTPS server block.
location = /desklink-diagnostics/health {
    proxy_pass http://127.0.0.1:3411/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header Server;
    add_header Cache-Control "no-store" always;
}

location = /desklink-diagnostics/v1/batches {
    limit_except POST { deny all; }
    limit_req zone=desklink_diagnostics burst=8 nodelay;
    client_max_body_size 64k;
    proxy_pass http://127.0.0.1:3411/v1/batches;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 3s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
    proxy_request_buffering on;
    proxy_buffering off;
    proxy_hide_header Server;
}
